services:
  app-v2:
    build: .
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      DB_HOST: postgres-v2
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-helpdesk_v2}
      DB_USER: ${DB_USER:-helpdesk_v2}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
    depends_on:
      postgres-v2:
        condition: service_healthy
    # Migrations are applied on container start; `npm run seed` is left as a
    # manual step (`docker compose exec app-v2 npm run seed`) so restarting
    # the stack never silently wipes/re-seeds data.
    command: sh -c "npm run migrate && npm start"
    restart: unless-stopped

  postgres-v2:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-helpdesk_v2}
      POSTGRES_USER: ${DB_USER:-helpdesk_v2}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-helpdesk_v2} -d ${DB_NAME:-helpdesk_v2}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data_v2:
